    const a = this.currentAdv;
    if (!confirm(`Transition ${a.id}: ${a.state} → ${newState}?`)) return;
    try {
      await API.setState(a.id, newState);
      toast(`State → ${newState}`, 'ok');
      await this.refreshList();
      await this.reopen();
    } catch (e) { toast('Error: ' + e, 'error'); }
  },
};

// Document type labels (used in renderDocuments chip bar and row pills)
const LABELS_DOC = { design: 'Design', plan: 'Plan', research: 'Research', review: 'Review' };

function count(arr) {

// ----------------------------------------------------------------------------
//  Document markdown helpers (ADV009-T009)
// ----------------------------------------------------------------------------

// splitSections(md) → { heading: body } keyed by ## headings.
// Handles YAML frontmatter (strips it before parsing).
function splitSections(md) {
  const text = md.replace(/^---\r?\n[\s\S]*?\r?\n---\r?\n?/, '');
  const lines = text.split('\n');
  const result = {};
  let current = null;
  let buf = [];
  for (const line of lines) {
    const m = line.match(/^## (.+)$/);
    if (m) {
      if (current !== null) result[current] = buf.join('\n').trim();
      current = m[1].trim();
      buf = [];
    } else {
      buf.push(line);
    }
  }
  if (current !== null) result[current] = buf.join('\n').trim();
  return result;
}

// parseSummaryTable(md) → key/value object from first pipe-table.
function parseSummaryTable(md) {
  const rows = {};
  const lines = md.split('\n');
  let foundTable = false;
  for (const line of lines) {
    if (!line.trim().startsWith('|')) { if (foundTable) break; continue; }
    foundTable = true;
    // Skip separator rows (|---|---|)
    if (/^\|[-\s|:]+\|/.test(line)) continue;
    const cells = line.split('|').map(s => s.trim()).filter((_, i, arr) => i > 0 && i < arr.length - 1);
    if (cells.length >= 2) rows[cells[0]] = cells[1];
  }
  return rows;
}

// parseIssuesList(md) → [{severity, text}] from "- [sev] text" bullets.
function parseIssuesList(md) {
  const SEVERITIES = ['blocker', 'major', 'minor', 'note'];
  const out = [];
  for (const line of md.split('\n')) {
    const m = line.match(/^[-*]\s+(?:\[([^\]]+)\]\s*)?(.+)$/);
    if (!m) continue;
    const raw = (m[1] || 'note').toLowerCase().trim();
    const severity = SEVERITIES.includes(raw) ? raw : 'note';
    out.push({ severity, text: m[2].trim() });
  }
  return out;
}

// parsePlanTaskCards(md) → [{title, summary}] from ### headings.
function parsePlanTaskCards(md) {
  if (!md) return [];
  const lines = md.split('\n');
  const cards = [];
  let cur = null;
  for (const line of lines) {
    const m = line.match(/^### (.+)$/);
    if (m) {
      if (cur) cards.push(cur);
      cur = { title: m[1].trim(), summary: '' };
    } else if (cur && !cur.summary) {
      const txt = line.trim();
      if (txt) cur.summary = txt;
    }
  }
  if (cur) cards.push(cur);
  return cards;
}

// ----------------------------------------------------------------------------
//  Knowledge-suggestion parser
//    Section 6 format (from adventure-reviewer agent):
//      ## 6. Knowledge Extraction Suggestions
//      ...
//      ### Suggestion 1 — Pattern — Title  (→ patterns.md)
//      body...
// ----------------------------------------------------------------------------
function parseKnowledgeSuggestions(md) {
  const lines = md.split('\n');
  let inSection = false;
  let cur = null;
  const out = [];
  const re = /^###\s+(?:Suggestion\s+)?(\d+)\s*[—\-:]\s*([A-Za-z]+)\s*[—\-:]\s*(.+?)(?:\s*\(→\s*(.+?)\))?\s*$/;

  for (const raw of lines) {
    const line = raw;
    if (/^##\s+6\./i.test(line) || /^##\s+Knowledge\s+Extraction/i.test(line)) {
      inSection = true; continue;
    }
    if (inSection && /^##\s/.test(line) && !/^##\s+6\./i.test(line)) {
      if (cur) { out.push(cur); cur = null; }
      inSection = false; break;
    }
    if (!inSection) continue;

    const m = line.match(re);
    if (m) {
      if (cur) out.push(cur);
      cur = {
        index: parseInt(m[1], 10),
        type: m[2].trim(),
        title: m[3].trim(),
        target: (m[4] || '').trim(),
        body: '',
      };
    } else if (cur) {
      cur.body += line + '\n';
    }
  }
  if (cur) out.push(cur);
  return out;
}

// ----------------------------------------------------------------------------
//  Permission-count parser (ADV009-T010)
//    Scans permissions.md for pipe-delimited table rows under ## Requests.
//    Column 3 (0-indexed col 2) is the type field: shell, file-read, file-write, mcp, etc.
//    Collapses file-read / file-write into a single "file" bucket.
//    Returns { shell: N, file: N, mcp: N }.
// ----------------------------------------------------------------------------
function parsePermissionCounts(md) {
  const counts = { shell: 0, file: 0, mcp: 0 };
  const lines = md.split('\n');
  let inRequests = false;

  for (const line of lines) {
    // Detect ## Requests section
    if (/^##\s+Requests\b/i.test(line)) { inRequests = true; continue; }
    // Stop at next ## heading
    if (inRequests && /^##\s/.test(line)) { break; }
    if (!inRequests) continue;

    // Skip non-table lines and separator rows
    if (!line.trim().startsWith('|')) continue;
    if (/^\|[-\s|:]+\|/.test(line)) continue;

    const cells = line.split('|').map(s => s.trim()).filter((_, i, arr) => i > 0 && i < arr.length - 1);
    // Column index 2 (0-based) is the type field: | # | name | type | ... |
    if (cells.length < 3) continue;
    const raw = cells[2].toLowerCase();

    if (raw === 'shell' || raw === 'bash' || raw === 'exec') {
      counts.shell++;
    } else if (raw.startsWith('file')) {
      counts.file++;
    } else if (raw === 'mcp' || raw.startsWith('mcp-')) {
      counts.mcp++;
    }
  }

  return counts;
}

// ----------------------------------------------------------------------------
//  PipelineEdit — graph edit affordances (ADV009-T020)
//  Provides: drag-to-depends, state-edge click, right-click context menu.
//  All mutations route through API.* helpers; no raw fetch/post here.
// ----------------------------------------------------------------------------
const EDIT_GUARD_MS = 500;

const PipelineEdit = {
  _busy: false,

  // Entry point called from mountCytoscape after cy is created
  attach(cy, adv) {
    this._cy  = cy;
    this._adv = adv;
    this._wireStateEdgeClick(cy, adv);
    this._wireDragToDepend(cy, adv);
    this._wireContextMenu(cy, adv);
  },

  // ---- Double-submit guard -----------------------------------------------
  guardOnce(fn) {
    if (PipelineEdit._busy) return;
    PipelineEdit._busy = true;
    try { return fn(); }
    finally { setTimeout(() => { PipelineEdit._busy = false; }, EDIT_GUARD_MS); }
  },

  // ---- State-transition edge click ---------------------------------------
  _wireStateEdgeClick(cy, adv) {
    cy.on('tap', 'edge[kind = "state_transition"]', evt => {
      const edge   = evt.target;
      const tgtId  = edge.data('target');
      // target node id format: "state:<name>"
      const match  = (tgtId || '').match(/^state:(.+)$/);
      const name   = match ? match[1] : tgtId;
      if (!name) return;

      PipelineEdit.guardOnce(async () => {
        try {
          await API.setState(adv.id, name);
          toast('State \u2192 ' + name, 'ok');
        } catch (e) {
          toast('Error: ' + (e && e.error ? e.error : e), 'error');
        }
      });
    });
  },

  // ---- Drag task A → task B to add depends_on ----------------------------
  _wireDragToDepend(cy, adv) {
    let dragSrcId    = null;
    let hoveredTgtId = null;
    let tentativeEl  = null;
    let mmHandler    = null;
    let muHandler    = null;

    const cancelDrag = () => {
      if (tentativeEl) { cy.remove(tentativeEl); tentativeEl = null; }
      const container = cy.container();
      if (mmHandler) { container.removeEventListener('mousemove', mmHandler); mmHandler = null; }
      if (muHandler) { container.removeEventListener('mouseup',   muHandler); muHandler = null; }
      dragSrcId    = null;
      hoveredTgtId = null;
    };

    cy.on('taphold', 'node[kind = "task"]', evt => {
      // Cancel any prior drag
      cancelDrag();

      dragSrcId = evt.target.id();
      // Add a tentative ghost edge (source → source while dragging)
      tentativeEl = cy.add({
        group: 'edges',
        data: { id: '_tentative', source: dragSrcId, target: dragSrcId,
                kind: 'depends_on', optimistic: true },
      });

      const container = cy.container();

      mmHandler = mmEvt => {
        // Find which task node the mouse is currently over
        const hit = cy.nodes('[kind = "task"]').filter(n => {
          const rp = n.renderedPosition();
          const r  = n.renderedOuterWidth() / 2;
          const cr = container.getBoundingClientRect();
          const mx = mmEvt.clientX - cr.left;
          const my = mmEvt.clientY - cr.top;
          return Math.hypot(rp.x - mx, rp.y - my) <= r;
        }).first();

        const newTgt = hit.length ? hit.id() : dragSrcId;
        if (newTgt !== hoveredTgtId) {
          hoveredTgtId = newTgt;
          if (tentativeEl) tentativeEl.move({ source: dragSrcId, target: hoveredTgtId });
        }
      };

      muHandler = () => {
        // Self-remove handler first (single-fire guarantee)
        container.removeEventListener('mousemove', mmHandler); mmHandler = null;
        container.removeEventListener('mouseup',   muHandler); muHandler = null;

        const srcId = dragSrcId;
        const tgtId = hoveredTgtId && hoveredTgtId !== srcId ? hoveredTgtId : null;

        // Remove tentative ghost
        if (tentativeEl) { cy.remove(tentativeEl); tentativeEl = null; }
        dragSrcId    = null;
        hoveredTgtId = null;

        if (!tgtId) return; // dropped on canvas or self — no POST

        // Add optimistic edge immediately
        const optId = '_opt-' + srcId + '-' + tgtId;
        // Remove if already exists (idempotent)
        cy.$('#' + optId).remove();
        cy.add({
          group: 'edges',
          data: { id: optId, source: srcId, target: tgtId,
                  kind: 'depends_on', optimistic: true },
        });

        PipelineEdit.guardOnce(async () => {
          try {
            await API.addDepends(adv.id, srcId, tgtId);
            toast('depends_on added: ' + srcId + ' \u2192 ' + tgtId, 'ok');
            // Leave the optimistic edge; next poll tick replaces it
          } catch (e) {
            // Rollback the optimistic edge
            cy.remove('#' + optId);
            const msg = (e && e.error) ? e.error : (String(e) || 'Server unreachable \u2014 retry?');
            toast(msg, 'error');
          }
        });
      };

      container.addEventListener('mousemove', mmHandler);
      container.addEventListener('mouseup',   muHandler, { once: false });
    });

    // Cancel drag if user taps canvas (left-click) without dragging
    cy.on('tap', evt => {
      if (evt.target === cy) cancelDrag();
    });
  },

  // ---- Right-click DOM context menu --------------------------------------
  _wireContextMenu(cy, adv) {
    const menu = document.getElementById('pipeline-ctx');
    if (!menu) return;

    const hideMenu = () => { menu.style.display = 'none'; };

    // Build a menu item element
    const menuItem = (label, fn) => {
      const el = document.createElement('div');
      el.className = 'context-menu-item';
      el.textContent = label;
      el.onclick = e => {
        e.stopPropagation();
        hideMenu();
        fn();
      };
      return el;
    };

    const showMenu = (node, clientX, clientY) => {
      menu.innerHTML = '';
      const kind    = node.data('kind');
      const docKind = node.data('docKind');
      const items   = [];

      if (kind === 'document') {
        // Open document link
        const path = node.data('path') || '';
        if (path) {
          items.push(menuItem('Open document', () => {
            window.open('/api/file?path=' + encodeURIComponent(path), '_blank');
          }));
        }
        // Approve design
        if (docKind === 'design') {
          const name = node.data('name') || node.id();
          items.push(menuItem('Approve design', () => {
            PipelineEdit.guardOnce(async () => {
              try {
                await API.approveDes(adv.id, name);
                toast('Design approved: ' + name, 'ok');
              } catch (e) {
                toast((e && e.error) ? e.error : String(e), 'error');
              }
            });
          }));
        }
      }

      if (kind === 'decision') {
        const label = (node.data('label') || '').toLowerCase();
        // Approve permissions
        if (label.includes('permission')) {
          items.push(menuItem('Approve permissions', () => {
            PipelineEdit.guardOnce(async () => {
              try {
                await API.approvePerm(adv.id);
                toast('Permissions approved', 'ok');
              } catch (e) {
                toast((e && e.error) ? e.error : String(e), 'error');
              }
            });
          }));
        }
        // Apply knowledge suggestion
        if (label.includes('knowledge')) {
          const indices = node.data('indices') || [];
          items.push(menuItem('Apply knowledge suggestion', () => {
            PipelineEdit.guardOnce(async () => {
              try {
                await API.applyKB(adv.id, [...indices]);
                toast('Knowledge suggestion applied', 'ok');
              } catch (e) {
                toast((e && e.error) ? e.error : String(e), 'error');
              }
            });
          }));
        }
      }

      if (kind === 'task') {
        const taskId = node.data('taskId') || node.id();
        items.push(menuItem('Open task detail', () => {
          App.switchTab('tasks');
          const task = (App.currentAdv && App.currentAdv.tasks || []).find(t => t.id === taskId);
          if (task) App.openTaskDetail(task, App.currentAdv);
        }));
      }

      if (!items.length) return; // no items → don't show empty menu

      for (const item of items) menu.appendChild(item);

      // Position the menu
      menu.style.display = 'block';
      menu.style.left = clientX + 'px';
      menu.style.top  = clientY + 'px';

      // Clamp to viewport
      const mr = menu.getBoundingClientRect();
      if (mr.right > window.innerWidth)  menu.style.left = (clientX - mr.width)  + 'px';
      if (mr.bottom > window.innerHeight) menu.style.top = (clientY - mr.height) + 'px';
    };

    // Right-click on any node
    cy.on('cxttap', 'node', evt => {
      const oe = evt.originalEvent;
      if (!oe) return;
      showMenu(evt.target, oe.clientX, oe.clientY);
    });

    // Hide on left-click anywhere on the canvas
    cy.on('tap', () => hideMenu());

    // Hide on outside DOM click
    document.addEventListener('click', e => {
      if (!menu.contains(e.target)) hideMenu();
    });

    // Hide on Escape
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') hideMenu();
    });
  },
};

// Kick off
App.refreshList();
</script>
</body>
</html>
